<head>
<meta charset="UTF-8">

<meta name="description" content="Entre em contato com a equipe do FrontQuiz através do formulário disponível nesta página.">

<body>

<header>
    <h1>💻 FrontQuiz</h1>
    <p>Teste seus conhecimentos em Programação Front-End</p>
    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="quiz.html">Quiz</a></li>

            <li><a href="contato.html" class="ativo">Contato</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="formulario">

    <h2>Fale conosco</h2>

    <form id="formContato">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>

        <button type="submit">Enviar</button>

        <p id="mensagem-status"></p>

    </form>

</section>

</main>

<script src="js/contato.js"></script>
